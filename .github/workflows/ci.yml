name: CI (PR Required Gates)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    name: Smoke Gate (lint / typing / smoke)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: mypy type check
        run: |
          # Config is read from pyproject.toml [tool.mypy].
          # TODO(Project Echo): 段階的 strict 化のため、将来的に --strict を有効化する。
          mypy src

      - name: Smoke tests
        run: pytest -q tests/test_smoke.py tests/test_examples_smoke.py

      - name: Unit tests
        run: |
          pytest -q \
            tests \
            --ignore=tests/benchmarks \
            --ignore=tests/test_smoke.py \
            --ignore=tests/test_examples_smoke.py \
            --ignore=tests/test_invariants.py \
            --ignore=tests/test_voice_integration.py \
            --ignore=tests/test_voice_cli.py \
            --ignore=tests/test_device_cli.py \
            --ignore-glob='tests/test_prop_*.py'

  invariants:
    name: Invariants Gate (core principles)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run invariant tests
        id: invariants_run
        continue-on-error: true
        run: |
          pytest -q tests/test_invariants.py 2>&1 | tee invariant_test_output.log
          echo "pytest_exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Invariant violation summary
        if: always()
        run: |
          {
            echo "## Invariants Gate Summary"
            echo ""
            if [ "${{ steps.invariants_run.outputs.pytest_exit_code }}" = "0" ]; then
              echo "✅ Invariants gate passed."
            else
              echo "❌ Invariants gate failed. Violated principle candidates:"
              if rg -n "Invariant 1 violated|AI must never recommend" invariant_test_output.log >/dev/null; then
                echo "- AI never recommends"
              fi
              if rg -n "Invariant 2 violated|must not auto-allow|Monopoly must not auto-allow" invariant_test_output.log >/dev/null; then
                echo "- Execution gate is conservative"
              fi
              if rg -n "Invariant 3 violated|Cannot reconstruct" invariant_test_output.log >/dev/null; then
                echo "- Evidence-first decision making"
              fi
              if rg -n "Invariant 4 violated|No hidden monetization" invariant_test_output.log >/dev/null; then
                echo "- No hidden monetization inputs"
              fi
              if rg -n "Invariant 5 violated|Signature does not verify|Tampering not detected" invariant_test_output.log >/dev/null; then
                echo "- Verifiable outputs"
              fi
              if rg -n "responsibility_boundary|boundary|reasons" invariant_test_output.log >/dev/null; then
                echo "- Responsibility boundary missing/invalid"
              fi
              echo ""
              echo "詳細は \`Run invariant tests\` のログを参照してください。"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail workflow when invariant tests failed
        if: steps.invariants_run.outputs.pytest_exit_code != '0'
        run: |
          echo "Invariant tests failed. See summary for violated principles."
          exit 1

  prop-core:
    name: Prop Core Gate (property-based)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Property-based core tests
        run: pytest -q tests/test_prop_*.py --hypothesis-show-statistics

  kpi-quick:
    name: KPI Quick Check (PR visibility)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run quick KPI probe
        id: kpi_probe
        run: |
          python scripts/ci_kpi_quick_check.py --json-out kpi_quick.json --md-out kpi_quick.md
          ALL_PASSED=$(python -c "import json; d=json.load(open('kpi_quick.json')); print(str(d['all_passed']).lower())")
          echo "all_passed=${ALL_PASSED}" >> "$GITHUB_OUTPUT"

      - name: Device boundary quick check
        run: pytest -q tests/test_device_*.py

      - name: Voice integration check
        run: pytest -q tests/test_voice_*.py

      - name: Publish KPI quick summary
        if: always()
        run: cat kpi_quick.md >> "$GITHUB_STEP_SUMMARY"

      - name: Post KPI result as PR comment
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('kpi_quick.md', 'utf8');
            const header = '<!-- echo-kpi-quick-check -->';
            const fullBody = `${header}\n${body}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.startsWith(header));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }

  ci-summary:
    name: CI Summary
    if: always()
    needs: [smoke, invariants, prop-core, kpi-quick]
    runs-on: ubuntu-latest
    steps:
      - name: Write gate summary
        run: |
          {
            echo "## PR Required Gates Summary"
            echo ""
            echo "| Gate | Result |"
            echo "|---|---|"
            echo "| Smoke | ${{ needs.smoke.result }} |"
            echo "| Invariants | ${{ needs.invariants.result }} |"
            echo "| Prop Core | ${{ needs.prop-core.result }} |"
            echo "| KPI Quick | ${{ needs.kpi-quick.result }} |"
            echo ""
            if [ "${{ needs.smoke.result }}" = "success" ] && [ "${{ needs.invariants.result }}" = "success" ] && [ "${{ needs.prop-core.result }}" = "success" ] && [ "${{ needs.kpi-quick.result }}" = "success" ]; then
              echo "✅ PR required gates passed."
            else
              echo "❌ PR required gates failed."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
